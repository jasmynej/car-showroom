spring:
  application:
    name: carshowroom
  datasource:
    url: jdbc:h2:mem:carshowroom;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        globally_quoted_identifiers: true
  sql:
    init:
      mode: always
